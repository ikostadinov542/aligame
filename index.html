<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Играта на Алара</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF7E8;
    --coral:#FF6B6B;
    --coral-d:#E84F4F;
    --gold:#FFC93C;
    --gold-d:#E8A91C;
    --green:#5FD068;
    --green-d:#43B24C;
    --sky:#4DB5FF;
    --sky-d:#2E98E6;
    --grape:#7C5CFC;
    --grape-d:#5E3FE0;
    --ink:#3A2E2A;
    --ink-soft:#6B5A52;
    --card:#FFFFFF;
    --shadow:rgba(58,46,42,.18);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Fredoka','Nunito',system-ui,sans-serif;
    color:var(--ink);
    background:var(--cream);
    overflow:hidden;
    position:relative;
    -webkit-user-select:none;user-select:none;
  }
  /* soft colour blobs in the background */
  .blob{position:fixed;border-radius:50%;filter:blur(40px);opacity:.45;z-index:0;pointer-events:none;}
  .blob.b1{width:50vw;height:50vw;background:var(--gold);top:-12vw;left:-12vw;}
  .blob.b2{width:46vw;height:46vw;background:var(--sky);bottom:-14vw;right:-12vw;}
  .blob.b3{width:38vw;height:38vw;background:var(--coral);bottom:30vh;left:-16vw;opacity:.30;}

  #app{position:relative;z-index:1;height:100%;max-width:600px;margin:0 auto;display:flex;flex-direction:column;}

  /* ---- top bar ---- */
  .topbar{display:flex;align-items:center;gap:10px;padding:14px 16px 6px;}
  .star-pill{
    display:flex;align-items:center;gap:7px;background:var(--gold);color:#5b3f00;
    font-weight:700;font-size:clamp(20px,6vw,28px);padding:8px 16px 8px 12px;border-radius:999px;
    box-shadow:0 4px 0 var(--gold-d);min-width:84px;justify-content:center;
  }
  .star-pill .ic{font-size:1.15em;line-height:1;}
  .spacer{flex:1;}
  .gear{
    width:48px;height:48px;border-radius:50%;background:#fff;border:none;cursor:pointer;
    font-size:22px;box-shadow:0 4px 0 var(--shadow);position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;color:var(--ink-soft);
  }
  .gear .ring{position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--grape) var(--p,0deg),transparent 0);opacity:.35;}

  /* ---- screens ---- */
  .screen{flex:1;display:none;flex-direction:column;padding:6px 16px 20px;overflow-y:auto;}
  .screen.on{display:flex;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  h1.greet{font-size:clamp(26px,8vw,40px);margin:10px 0 2px;font-weight:700;}
  .sub{color:var(--ink-soft);font-size:clamp(15px,4vw,18px);margin:0 0 18px;font-weight:500;}

  .big-btn{
    border:none;cursor:pointer;color:#fff;font-family:inherit;font-weight:700;
    border-radius:28px;padding:24px;font-size:clamp(22px,6.5vw,30px);
    display:flex;align-items:center;justify-content:center;gap:14px;width:100%;
    transition:transform .07s;
  }
  .big-btn .em{font-size:1.3em;}
  .big-btn:active{transform:translateY(4px);}
  .big-btn.play{background:var(--coral);box-shadow:0 7px 0 var(--coral-d);margin-bottom:16px;}
  .big-btn.shop{background:var(--sky);box-shadow:0 7px 0 var(--sky-d);}
  .home-btns{margin-top:auto;}

  /* category picker */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;}
  .cat-tile{
    background:var(--card);border:none;cursor:pointer;font-family:inherit;border-radius:22px;
    padding:18px 10px;box-shadow:0 5px 0 var(--shadow);display:flex;flex-direction:column;
    align-items:center;gap:8px;transition:transform .07s;color:var(--ink);
  }
  .cat-tile:active{transform:translateY(4px);}
  .cat-tile .ce{font-size:clamp(40px,12vw,56px);line-height:1;}
  .cat-tile .cn{font-weight:600;font-size:clamp(15px,4.2vw,19px);}
  .cat-tile.surprise{background:linear-gradient(135deg,var(--grape),var(--sky));color:#fff;box-shadow:0 5px 0 var(--grape-d);}

  .back{
    align-self:flex-start;background:#fff;border:none;cursor:pointer;font-family:inherit;font-weight:600;
    color:var(--ink-soft);border-radius:999px;padding:10px 18px;box-shadow:0 4px 0 var(--shadow);
    font-size:17px;margin-bottom:10px;display:flex;align-items:center;gap:6px;
  }
  .back:active{transform:translateY(3px);}

  .section-title{font-size:clamp(20px,5.5vw,26px);font-weight:700;margin:4px 0 14px;}

  /* ---- game ---- */
  .prompt{
    text-align:center;background:var(--card);border-radius:26px;padding:22px 16px;
    box-shadow:0 6px 0 var(--shadow);margin-bottom:4px;
  }
  .prompt .ptag{color:var(--ink-soft);font-weight:600;font-size:clamp(15px,4.2vw,19px);margin-bottom:6px;}
  .prompt .pbig{font-size:clamp(70px,22vw,150px);line-height:1.05;font-weight:700;}
  .prompt .pbig-img{display:inline-block;height:clamp(140px,34vh,300px);max-width:86%;object-fit:contain;border-radius:20px;box-shadow:0 8px 22px rgba(0,0,0,.14);}
  .prompt .pword{font-size:clamp(40px,12vw,84px);font-weight:700;letter-spacing:1px;color:var(--coral);}
  .count-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;font-size:clamp(30px,9vw,52px);}

  .options{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:auto;padding-top:16px;}
  @media (max-width:380px){.options{gap:9px;}}
  .opt{
    background:var(--card);border:4px solid transparent;cursor:pointer;border-radius:24px;
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;
    box-shadow:0 5px 0 var(--shadow);font-size:clamp(38px,12vw,74px);transition:transform .07s;
    font-family:inherit;font-weight:700;color:var(--ink);padding:6px;line-height:1;
  }
  .opt .mini{font-size:.42em;}
  .opt:active{transform:translateY(4px);}
  .opt.right{border-color:var(--green);animation:pop .4s;}
  .opt.wrong{animation:shake .4s;}
  @keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.12);}100%{transform:scale(1);}}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-9px);}40%{transform:translateX(9px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}

  .cheer{text-align:center;font-weight:700;font-size:clamp(20px,5.5vw,26px);min-height:1.4em;margin-top:12px;color:var(--green-d);}
  .cheer.try{color:var(--ink-soft);}

  .card-stage{flex:1;display:flex;flex-direction:column;justify-content:center;gap:12px;}
  .card-caption{text-align:center;font-weight:600;color:var(--ink-soft);font-size:clamp(16px,4.5vw,21px);}
  .card-caption .cap-cat{color:var(--grape);}
  .judge{display:grid;grid-template-columns:1fr 1fr 1.4fr;gap:9px;margin-top:8px;}
  .judge-btn{border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:22px;padding:16px 6px;
    display:flex;flex-direction:column;align-items:center;gap:3px;color:#fff;transition:transform .07s;line-height:1;}
  .judge-btn>span{font-size:clamp(13px,3.6vw,17px);font-weight:600;}
  .judge-btn:active{transform:translateY(4px);}
  .judge-btn.yes{background:var(--green);box-shadow:0 6px 0 var(--green-d);font-size:clamp(28px,7.5vw,38px);}
  .judge-btn.skip{background:#fff;color:var(--ink-soft);box-shadow:0 6px 0 var(--shadow);font-size:clamp(22px,6vw,30px);}
  .judge-btn.wrong{background:var(--coral);box-shadow:0 6px 0 var(--coral-d);font-size:clamp(22px,6vw,30px);}

  .mini-btn{border:none;cursor:pointer;font-family:inherit;font-weight:700;background:#fff;color:var(--grape);
    border-radius:18px;padding:14px;font-size:clamp(16px,4.5vw,19px);width:100%;box-shadow:0 4px 0 var(--shadow);margin-top:12px;}
  .mini-btn:active{transform:translateY(3px);}

  .profile-list{display:flex;flex-direction:column;gap:12px;margin-top:8px;}
  .profile-card{display:flex;align-items:center;gap:14px;background:var(--card);border:none;cursor:pointer;
    font-family:inherit;border-radius:22px;padding:16px 18px;box-shadow:0 5px 0 var(--shadow);color:var(--ink);transition:transform .07s;}
  .profile-card:active{transform:translateY(4px);}
  .profile-card .pc-emoji{font-size:34px;line-height:1;}
  .profile-card .pc-name{flex:1;text-align:left;font-weight:700;font-size:clamp(18px,5vw,22px);}
  .profile-card .pc-lock{font-size:18px;}

  .wheel-btn{border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:22px;padding:16px;
    font-size:clamp(17px,4.8vw,21px);width:100%;color:#5b3f00;background:linear-gradient(100deg,#FFD93C,#FFB23C);
    box-shadow:0 5px 0 var(--gold-d);display:flex;align-items:center;justify-content:center;gap:10px;margin:2px 0 6px;}
  .wheel-btn:active{transform:translateY(3px);}
  .wheel-btn .wem{font-size:1.4em;}
  .wheel-btn.locked{background:#EFE3CF;color:var(--ink-soft);box-shadow:0 5px 0 #D9C9AF;}
  .wheel-btn.ready{animation:wpulse 1.7s ease-in-out infinite;}
  @keyframes wpulse{0%,100%{transform:scale(1);}50%{transform:scale(1.035);}}

  .wheel-wrap{position:relative;width:min(78vw,300px);margin:10px auto 4px;}
  .wheel-spin{width:100%;transform-origin:50% 50%;}
  .wheel-spin svg{display:block;width:100%;height:auto;filter:drop-shadow(0 6px 14px rgba(0,0,0,.18));}
  .wheel-pointer{position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:0;height:0;z-index:2;
    border-left:14px solid transparent;border-right:14px solid transparent;border-top:24px solid var(--ink);}
  .wheel-result{text-align:center;min-height:1.6em;margin:8px 0;}
  .wheel-prize{font-weight:700;color:var(--grape-d);font-size:clamp(18px,5vw,22px);}

  .boost-badge{align-self:center;background:var(--grape);color:#fff;font-weight:700;border-radius:999px;
    padding:6px 15px;font-size:15px;box-shadow:0 3px 0 var(--grape-d);}

  .first-letter{display:flex;align-items:center;justify-content:center;gap:9px;}
  .first-letter .fl-hint{color:var(--ink-soft);font-weight:600;font-size:14px;}
  .first-letter .fl-letter{display:inline-flex;align-items:center;justify-content:center;min-width:46px;height:46px;
    padding:0 10px;border-radius:14px;background:#FFF0C9;color:var(--coral-d);font-weight:700;font-size:28px;box-shadow:0 3px 0 #F0DCA0;}

  .cat-tile{position:relative;}
  .tile-badge{position:absolute;top:7px;right:9px;font-size:18px;}

  .bars{display:flex;align-items:flex-end;justify-content:space-between;gap:4px;height:120px;padding-top:6px;}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:3px;}
  .bar-col .bar{width:72%;max-width:30px;background:var(--green);border-radius:6px 6px 0 0;min-height:3px;}
  .bar-col .bar-num{font-size:12px;font-weight:700;color:var(--ink-soft);min-height:14px;}
  .bar-col .bar-lbl{font-size:12px;color:var(--ink-soft);font-weight:600;}

  .card-points{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:6px;}
  .card-points .cp-btn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;font-family:inherit;
    font-weight:700;font-size:26px;line-height:1;background:#fff;color:var(--ink);box-shadow:0 4px 0 var(--shadow);
    display:flex;align-items:center;justify-content:center;}
  .card-points .cp-btn:active{transform:translateY(3px);}
  .card-points .cp-val{font-weight:700;color:var(--gold-d);font-size:21px;min-width:58px;text-align:center;}
  .chip-pts{display:inline-flex;align-items:center;gap:3px;background:#fff;border-radius:999px;padding:1px 3px;margin:0 2px;}
  .chip-pts b{min-width:14px;text-align:center;font-size:13px;color:var(--grape-d);}
  .cpx{width:21px;height:21px;border:none;border-radius:50%;cursor:pointer;font-weight:700;line-height:1;background:var(--cream);color:var(--ink);}

  /* ---- shop ---- */
  .shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
  .treat{
    background:var(--card);border-radius:24px;padding:16px 12px 14px;box-shadow:0 5px 0 var(--shadow);
    display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;border:none;font-family:inherit;
    color:var(--ink);transition:transform .07s;position:relative;
  }
  .treat:active{transform:translateY(4px);}
  .treat .timg{font-size:clamp(44px,13vw,64px);line-height:1;}
  .treat img.timg{width:clamp(60px,18vw,86px);height:clamp(60px,18vw,86px);object-fit:cover;border-radius:16px;}
  .treat .tname{font-weight:600;font-size:clamp(16px,4.5vw,20px);text-align:center;}
  .treat .tprice{display:flex;align-items:center;gap:5px;font-weight:700;color:#5b3f00;background:var(--gold);
    padding:5px 12px;border-radius:999px;font-size:clamp(15px,4.2vw,18px);}
  .treat.locked{opacity:.62;}
  .treat.locked .tprice{background:#EADBC8;color:var(--ink-soft);}
  .treat .need{font-size:13px;color:var(--ink-soft);font-weight:600;}
  .treat .own{position:absolute;top:8px;right:8px;background:var(--green);color:#fff;font-weight:700;
    border-radius:999px;min-width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    font-size:14px;padding:0 6px;}

  /* ---- overlays ---- */
  .overlay{position:fixed;inset:0;background:rgba(58,46,42,.55);z-index:50;display:none;
    align-items:center;justify-content:center;padding:20px;}
  .overlay.on{display:flex;animation:fade .2s ease;}
  .sheet{background:var(--cream);border-radius:30px;width:100%;max-width:480px;max-height:92vh;
    overflow-y:auto;padding:22px;box-shadow:0 12px 40px rgba(0,0,0,.3);}
  .sheet h2{margin:0 0 4px;font-size:clamp(22px,6vw,28px);}
  .sheet .hint{color:var(--ink-soft);margin:0 0 16px;font-size:15px;font-weight:500;}

  .buy-card{text-align:center;}
  .buy-card .bigtreat{font-size:90px;line-height:1;margin:6px 0;}
  .buy-card img.bigtreat{width:120px;height:120px;object-fit:cover;border-radius:22px;display:block;margin:6px auto;}
  .hold-btn{position:relative;overflow:hidden;border:none;cursor:pointer;color:#fff;font-family:inherit;
    font-weight:700;background:var(--green);border-radius:22px;padding:20px;font-size:22px;width:100%;
    box-shadow:0 6px 0 var(--green-d);margin-top:14px;}
  .hold-btn .fill{position:absolute;left:0;top:0;bottom:0;width:0;background:rgba(255,255,255,.32);}
  .hold-btn .lbl{position:relative;}
  .cancel{background:none;border:none;color:var(--ink-soft);font-family:inherit;font-weight:600;
    font-size:17px;cursor:pointer;margin-top:12px;padding:8px;width:100%;}

  /* ---- parent panel ---- */
  .pblock{background:var(--card);border-radius:20px;padding:14px 16px;margin-bottom:14px;box-shadow:0 4px 0 var(--shadow);}
  .pblock h3{margin:0 0 10px;font-size:18px;display:flex;align-items:center;gap:8px;}
  .row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F0E6D6;}
  .row:last-child{border-bottom:none;}
  .row .rl{flex:1;display:flex;align-items:center;gap:9px;font-weight:600;font-size:16px;}
  .row .rl .re{font-size:24px;}
  .stepper{display:flex;align-items:center;gap:8px;}
  .step{width:38px;height:38px;border-radius:12px;border:none;cursor:pointer;font-family:inherit;
    font-weight:700;font-size:22px;background:var(--cream);color:var(--ink);box-shadow:0 3px 0 var(--shadow);
    display:flex;align-items:center;justify-content:center;}
  .step:active{transform:translateY(2px);}
  .step.minus{background:#FFE2E2;}
  .step.plus{background:#DBF5DE;}
  .val{min-width:34px;text-align:center;font-weight:700;font-size:19px;}
  .toggle{width:52px;height:30px;border-radius:999px;background:#E2D6C4;border:none;cursor:pointer;position:relative;transition:background .15s;flex-shrink:0;}
  .toggle.on{background:var(--green);}
  .toggle .knob{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .toggle.on .knob{left:25px;}

  .pbtn{border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:14px;padding:11px 14px;
    font-size:15px;color:#fff;background:var(--grape);box-shadow:0 4px 0 var(--grape-d);}
  .pbtn:active{transform:translateY(3px);}
  .pbtn.ghost{background:#fff;color:var(--ink-soft);box-shadow:0 4px 0 var(--shadow);}
  .pbtn.danger{background:var(--coral);box-shadow:0 4px 0 var(--coral-d);}
  .pbtn.full{width:100%;margin-top:6px;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;}

  input.fld,select.fld{font-family:inherit;font-size:16px;padding:11px 13px;border-radius:13px;border:2px solid #EADBC8;
    background:#fff;color:var(--ink);width:100%;font-weight:600;}
  input.fld:focus,select.fld:focus{outline:none;border-color:var(--grape);}
  .field-row{display:flex;gap:8px;margin-bottom:8px;}
  .field-row .grow{flex:1;}
  label.lab{font-size:13px;color:var(--ink-soft);font-weight:600;display:block;margin:8px 0 4px;}

  .items-wrap{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 4px;}
  .items-wrap{display:flex;flex-direction:column;margin:4px 0;}
  .item-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #F4ECDD;}
  .item-row:last-child{border-bottom:none;}
  .ir-media{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    font-size:26px;background:var(--cream);cursor:pointer;overflow:hidden;position:relative;flex-shrink:0;}
  .ir-media img{width:100%;height:100%;object-fit:cover;}
  .ir-media .cam{position:absolute;right:-3px;bottom:-3px;font-size:11px;background:#fff;border-radius:50%;
    width:17px;height:17px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .ir-name{flex:1;font-weight:600;font-size:15px;}
  .ir-btn{width:34px;height:34px;border:none;border-radius:10px;cursor:pointer;background:var(--cream);font-size:15px;flex-shrink:0;}
  .ir-btn:active{transform:translateY(2px);}
  .newimg-prev img{vertical-align:middle;}
  .chip{display:inline-flex;align-items:center;gap:5px;background:var(--cream);border-radius:999px;padding:5px 8px 5px 10px;font-size:15px;font-weight:600;}
  .chip .x{background:#FFD9D9;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;color:var(--coral-d);font-weight:700;line-height:1;}
  .cat-acc{padding:8px 0;border-bottom:1px solid #F0E6D6;}
  .cat-head{display:flex;align-items:center;gap:9px;cursor:pointer;}
  .cat-head .re{font-size:24px;}
  .cat-head .nm{flex:1;font-weight:600;}
  .cat-body{display:none;padding:8px 0 4px 4px;}
  .cat-body.open{display:block;}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);
    color:#fff;padding:12px 22px;border-radius:999px;font-weight:600;z-index:80;opacity:0;transition:.25s;pointer-events:none;font-size:16px;}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

  .sync-pill{position:fixed;left:12px;bottom:12px;z-index:75;background:#fff;color:var(--ink-soft);
    border-radius:999px;padding:6px 13px;font-size:12.5px;font-weight:600;box-shadow:0 3px 12px rgba(0,0,0,.14);
    display:flex;align-items:center;gap:6px;opacity:.95;}
  .sync-pill.hide{display:none;}

  .float-star{position:fixed;z-index:70;font-weight:700;color:var(--gold-d);font-size:30px;pointer-events:none;
    animation:floatup 1s ease forwards;}
  @keyframes floatup{0%{opacity:0;transform:translateY(0) scale(.6);}20%{opacity:1;}100%{opacity:0;transform:translateY(-70px) scale(1.2);}}

  .confetti{position:fixed;top:-10px;z-index:60;pointer-events:none;border-radius:2px;}
  @keyframes confall{to{transform:translateY(105vh) rotate(720deg);opacity:0;}}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;transition-duration:.05s!important;}
  }
</style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>

/* ---------- profiles + state ---------- */
function migrate(s){
  if(!s||!Array.isArray(s.categories)) return s;
  const f=s.categories.find(c=>c.id==="plodove");
  const v=s.categories.find(c=>c.id==="zelenchuci");
  if(f&&v&&!s.categories.find(c=>c.id==="plodzelen")){
    const items=[...f.items.map(i=>({...i,t:i.t||"плод"})),...v.items.map(i=>({...i,t:i.t||"зеленчук"}))];
    const merged={id:"plodzelen",name:"Плодове и зеленчуци",icon:"🍎",points:f.points||1,on:f.on!==false,items};
    const idx=Math.min(s.categories.indexOf(f),s.categories.indexOf(v));
    s.categories=s.categories.filter(c=>c.id!=="plodove"&&c.id!=="zelenchuci");
    s.categories.splice(idx,0,merged);
  }
  return s;
}
let App = loadApp();
let state = null;            // данните на активния профил
function loadApp(){
  try{const r=localStorage.getItem(APPKEY);if(r)return JSON.parse(r);}catch(e){}
  try{const r=localStorage.getItem(KEY);if(r){const legacy=migrate(Object.assign(defaults(),JSON.parse(r)));
    return {profiles:[{id:"p"+Date.now(),name:"Алара",emoji:"🧒",pass:"",data:legacy}],activeId:null};}}catch(e){}
  return {profiles:[],activeId:null};
}
function saveApp(){try{localStorage.setItem(APPKEY,JSON.stringify(App));}catch(e){}}
function activeProfile(){return App.profiles.find(p=>p.id===App.activeId);}
function activeName(){const p=activeProfile();return p?p.name:"";}
function save(){const p=activeProfile();if(p)p.data=state;saveApp();queueCloudPush();}

/* ---------- Supabase cloud sync ---------- */
const SB_URL="https://zrrrasqprlgfsdvcxfkh.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpycnJhc3FwcmxnZnNkdmN4ZmtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MzE3NDUsImV4cCI6MjA5NzQwNzc0NX0.lAdwugTCM9gASreswClfHEVtze02cKKycgzYJHooBRg";
const SB_H={apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json"};
function setSync(s){
  const el=$("#syncStatus"); if(!el)return;
  const map={loading:["⏳","Зареждане…"],saving:["⏳","Записва…"],ok:["☁️","Синхронизирано"],offline:["⚠️","Офлайн — пази локално"]};
  const m=map[s]||map.ok; el.textContent=m[0]+" "+m[1]; el.classList.remove("hide");
  clearTimeout(el._t);
  if(s==="ok") el._t=setTimeout(()=>el.classList.add("hide"),2500);
}
async function cloudFetchAll(){
  const r=await fetch(`${SB_URL}/rest/v1/profiles?select=id,name,emoji,pass,data&order=name.asc`,{headers:SB_H});
  if(!r.ok) throw new Error("fetch "+r.status);
  return await r.json();
}
async function cloudUpsert(p){
  const row={id:p.id,name:p.name,emoji:p.emoji||"🧒",pass:p.pass||"",data:p.data||{},updated_at:new Date().toISOString()};
  const r=await fetch(`${SB_URL}/rest/v1/profiles?on_conflict=id`,{method:"POST",
    headers:{...SB_H,Prefer:"resolution=merge-duplicates,return=minimal"},body:JSON.stringify(row)});
  if(!r.ok) throw new Error("upsert "+r.status);
}
async function cloudDelete(id){
  const r=await fetch(`${SB_URL}/rest/v1/profiles?id=eq.${encodeURIComponent(id)}`,{method:"DELETE",headers:{...SB_H,Prefer:"return=minimal"}});
  if(!r.ok) throw new Error("delete "+r.status);
}
let pushTimer=null;
function queueCloudPush(){
  const p=activeProfile(); if(!p) return;
  setSync("saving"); clearTimeout(pushTimer);
  pushTimer=setTimeout(async()=>{
    try{ await cloudUpsert(activeProfile()); setSync("ok"); }catch(e){ setSync("offline"); }
  },900);
}
async function pushProfileNow(p){ setSync("saving"); try{ await cloudUpsert(p); setSync("ok"); }catch(e){ setSync("offline"); } }
async function refreshProfilesFromCloud(){
  setSync("loading");
  try{
    const cloud=await cloudFetchAll();
    const ids=new Set(cloud.map(r=>r.id));
    const merged=cloud.map(r=>({id:r.id,name:r.name,emoji:r.emoji||"🧒",pass:r.pass||"",data:r.data||defaults()}));
    for(const lp of App.profiles){ if(!ids.has(lp.id)){ merged.push(lp); cloudUpsert(lp).catch(()=>{}); } }
    App.profiles=merged; saveApp(); renderProfileList(); setSync("ok");
  }catch(e){ setSync("offline"); }
}

/* ---------- helpers ---------- */
const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
const rnd=a=>a[Math.floor(Math.random()*a.length)];
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function show(id){$$(".screen").forEach(s=>s.classList.toggle("on",s.id===id));if(id==="home")updateWheelBtn();if(id==="game")renderBoostBadge();}
function renderStars(){if(!state)return;$("#starCount").textContent=state.stars;}
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("on");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("on"),1800);}

/* ---------- home ---------- */
$("#goPlay").onclick=()=>{renderCatPicker();show("catpick");};
$("#goShop").onclick=()=>{renderShop();show("shop");};
$$("[data-home]").forEach(b=>b.onclick=()=>show("home"));

/* ---------- category picker ---------- */
function renderCatPicker(){
  const g=$("#catGrid");g.innerHTML="";
  const sur=document.createElement("button");
  sur.className="cat-tile surprise";
  sur.innerHTML='<span class="ce">🎲</span><span class="cn">Изненада</span>';
  sur.onclick=()=>startGame("mixed");
  g.appendChild(sur);
  state.categories.filter(c=>c.on&&c.items.length).forEach(c=>{
    const b=document.createElement("button");
    b.className="cat-tile";
    const lvl=levelFor(catCorrect(c.id)).lv;
    b.innerHTML=`<span class="tile-badge" title="${lvl.n}">${lvl.i}</span><span class="ce">${c.icon}</span><span class="cn">${c.name}</span>`;
    b.onclick=()=>startGame(c.id);
    g.appendChild(b);
  });
}

/* ---------- game engine (flashcards, parent-judged) ---------- */
let gctx=null;
function startGame(catId){gctx={catId,busy:false};show("game");nextCard();}
function activeCats(){return state.categories.filter(c=>c.on&&c.items.length);}
function pickCat(){
  if(gctx.catId==="mixed") return rnd(activeCats());
  return state.categories.find(c=>c.id===gctx.catId);
}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function nextCard(){
  $("#cheer").textContent="";$("#cheer").className="cheer";
  gctx.busy=false;
  const cat=pickCat();
  let promptHTML, answer, itemTag="", it=null;
  if(cat.id==="cifri"){
    it=rnd(cat.items); const n=it.n;
    if(Math.random()<0.5){
      promptHTML=`<div class="ptag">Кое число е това?</div><div class="pbig">${n}</div>`;
    }else{
      const emo=rnd(["🍎","⭐","🐤","🎈","🍓","🚗","🌸"]);
      promptHTML=`<div class="ptag">Преброй колко са</div><div class="count-row">${emo.repeat(n)}</div>`;
    }
    answer=String(n);
  }else{
    it=rnd(cat.items);
    const q = cat.id==="bukvi" ? "Коя буква е това?"
            : cat.id==="plodzelen" ? "Плод или зеленчук? Кажи кое е."
            : "Кажи какво е";
    const media = it.img ? `<img class="pbig-img" src="${it.img}" alt="">` : `<div class="pbig">${it.e}</div>`;
    promptHTML=`<div class="ptag">${q}</div>${media}`;
    answer=cap(it.l);
    if(it.t) itemTag=cap(it.t);
  }
  gctx.cat=cat; gctx.item=it;
  gctx.award = (it.p!=null) ? it.p : cat.points;
  const prefix = itemTag ? itemTag : (gctx.catId==="mixed" ? cat.name : "");
  $("#prompt").innerHTML=promptHTML;
  const capEl=$("#caption");
  if(state.showWord){ capEl.style.display="block"; capEl.innerHTML=`<span class="cap-cat">${prefix?prefix+" · ":""}</span>${answer}`; }
  else capEl.style.display="none";
  const flEl=$("#firstLetter");
  if(flEl){
    const ok = state.firstLetter && cat.id!=="cifri" && cat.id!=="bukvi" && answer && /[A-Za-zА-Яа-я]/.test(answer[0]);
    if(ok){ flEl.style.display="flex"; flEl.innerHTML=`<span class="fl-hint">започва с</span><span class="fl-letter">${answer[0].toUpperCase()}</span>`; }
    else flEl.style.display="none";
  }
  renderCardPoints();
  renderBoostBadge();
}
function renderCardPoints(){ const el=$("#cpNum"); if(el) el.textContent=(gctx&&gctx.award!=null)?gctx.award:1; }
function changeCardPoints(d){
  if(!gctx||!gctx.item)return;
  const it=gctx.item, base=(it.p!=null?it.p:gctx.cat.points);
  it.p=Math.max(1,base+d); save(); gctx.award=it.p; renderCardPoints();
}
function recordStat(catId,kind){
  if(!state.stats)state.stats={};
  if(!state.stats[catId])state.stats[catId]={correct:0,wrong:0};
  state.stats[catId][kind]=(state.stats[catId][kind]||0)+1;
}
function dateKey(d){d=d||new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function recordDaily(kind){
  if(!state.daily)state.daily={};const k=dateKey();
  if(!state.daily[k])state.daily[k]={correct:0,wrong:0};
  state.daily[k][kind]=(state.daily[k][kind]||0)+1;
}
function catCorrect(id){return (state.stats&&state.stats[id]&&state.stats[id].correct)||0;}
const LEVELS=[{i:"🥉",n:"Бронз",min:0},{i:"🥈",n:"Сребро",min:20},{i:"🥇",n:"Злато",min:50},{i:"🏆",n:"Шампион",min:100}];
function levelFor(c){let lv=LEVELS[0];for(const L of LEVELS)if(c>=L.min)lv=L;const idx=LEVELS.indexOf(lv);return {lv,next:LEVELS[idx+1]||null};}
function checkMilestone(){
  if(!state.nextMilestone)state.nextMilestone=30;
  if((state.earned||0) >= state.nextMilestone){
    while((state.earned||0) >= state.nextMilestone) state.nextMilestone+=30;
    save();
    setTimeout(showMilestone,650);
  }
}
function judgeYes(){
  if(!gctx||gctx.busy)return; gctx.busy=true;
  let gain=gctx.award;
  if(state.boost&&state.boost.left>0) gain*=state.boost.mult;
  consumeBoost();
  state.stars+=gain;
  state.earned=(state.earned||0)+gain;
  const before=catCorrect(gctx.cat.id);
  recordStat(gctx.cat.id,"correct");
  recordDaily("correct");
  save(); renderStars(); renderBoostBadge();
  floatStar("+"+gain); confetti();
  $("#cheer").textContent=rnd(["Браво! 🎉","Супер! ⭐","Точно така! 👏","Умница! 🌟","Ехаа! 🎈"]);
  $("#cheer").className="cheer";

/* ---------- daily wheel ---------- */
const WHEEL=[
  {t:"star",v:5,label:"5⭐",color:"#FFC93C"},
  {t:"boost",v:2,n:5,label:"×2",color:"#7C5CFC"},
  {t:"star",v:10,label:"10⭐",color:"#5FD068"},
  {t:"star",v:5,label:"5⭐",color:"#4DB5FF"},
  {t:"star",v:15,label:"15⭐",color:"#FF6B6B"},
  {t:"boost",v:2,n:5,label:"×2",color:"#7C5CFC"},
  {t:"star",v:10,label:"10⭐",color:"#5FD068"},
  {t:"star",v:20,label:"20⭐",color:"#FFB23C"}
];
const DAY=24*3600*1000;
function canSpin(){return (Date.now()-(state.lastSpin||0))>=DAY;}
function spinRemaining(){return Math.max(0,DAY-(Date.now()-(state.lastSpin||0)));}
function renderBoostBadge(){
  const el=$("#boostBadge"); if(!el||!state)return;
  if(state.boost&&state.boost.left>0){el.style.display="block";el.textContent=`⚡ Двойни точки · още ${state.boost.left}`;}
  else el.style.display="none";
}
function consumeBoost(){
  if(state.boost&&state.boost.left>0){ state.boost.left--; if(state.boost.left<=0)state.boost=null; }
}
function updateWheelBtn(){
  const b=$("#wheelBtn"),l=$("#wheelLbl"); if(!b||!l||!state)return;
  if(canSpin()){b.classList.add("ready");b.classList.remove("locked");l.textContent="Завърти колелото!";}
  else{
    b.classList.remove("ready");b.classList.add("locked");
    const ms=spinRemaining(),h=Math.floor(ms/3600000),m=Math.floor(ms%3600000/60000);
    l.textContent = h>0 ? `Колело — след ${h}ч ${m}м` : `Колело — след ${m} мин`;
  }
}
function buildWheelSVG(){
  const n=WHEEL.length,cx=100,cy=100,r=98,seg=360/n;
  const pt=(deg,rad)=>{const a=deg*Math.PI/180;return [cx+rad*Math.sin(a),cy-rad*Math.cos(a)];};
  let paths="",labels="";
  for(let i=0;i<n;i++){
    const [x0,y0]=pt(i*seg,r),[x1,y1]=pt((i+1)*seg,r);
    paths+=`<path d="M${cx} ${cy} L${x0.toFixed(2)} ${y0.toFixed(2)} A${r} ${r} 0 0 1 ${x1.toFixed(2)} ${y1.toFixed(2)} Z" fill="${WHEEL[i].color}" stroke="#fff" stroke-width="2"/>`;
    const [lx,ly]=pt(i*seg+seg/2,r*0.64);
    labels+=`<text x="${lx.toFixed(2)}" y="${ly.toFixed(2)}" text-anchor="middle" dominant-baseline="central" font-size="19" font-weight="700" fill="#fff" font-family="Fredoka,sans-serif">${WHEEL[i].label}</text>`;
  }
  return `<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">${paths}${labels}<circle cx="100" cy="100" r="15" fill="#fff" stroke="#EADBC8" stroke-width="2"/></svg>`;
}
let wheelRot=0,spinning=false;
function openWheel(){
  if(!canSpin()){
    const ms=spinRemaining(),h=Math.floor(ms/3600000),m=Math.floor(ms%3600000/60000);
    openModal(`<div style="text-align:center"><div style="font-size:72px;line-height:1">🎡</div>
      <h2>Колелото почива</h2><p class="hint">Ела пак след ${h>0?h+"ч "+m+"м":m+" мин"} за нова награда!</p>
      <button class="pbtn full" id="modalClose">Добре</button></div>`);
    $("#modalClose").onclick=closeModal; return;
  }
  wheelRot=0;
  openModal(`<h2 style="text-align:center;margin-bottom:2px">🎡 Колелото на късмета</h2>
    <p class="hint" style="text-align:center">Завърти веднъж на ден!</p>
    <div class="wheel-wrap"><div class="wheel-pointer"></div><div class="wheel-spin" id="wheelSpin">${buildWheelSVG()}</div></div>
    <div class="wheel-result" id="wheelResult"></div>
    <button class="pbtn full" id="spinBtn">Завърти!</button>`);
  $("#spinBtn").onclick=spin;
}
function applyPrize(p){
  if(p.t==="star"){state.stars+=p.v;state.earned=(state.earned||0)+p.v;renderStars();}
  else if(p.t==="boost"){state.boost={mult:p.v,left:p.n};renderBoostBadge();}
  save();
}
function spin(){
  if(spinning||!canSpin())return;
  spinning=true;
  const sb=$("#spinBtn");sb.disabled=true;sb.textContent="…";
  const i=Math.floor(Math.random()*WHEEL.length);
  applyPrize(WHEEL[i]);
  state.lastSpin=Date.now();save();updateWheelBtn();
  const seg=360/WHEEL.length, target=(360-(i*seg+seg/2))%360;
  wheelRot += 360*5 + ((target-(wheelRot%360)+360)%360);
  const el=$("#wheelSpin");
  el.style.transition="transform 3.6s cubic-bezier(.16,.84,.3,1)";
  el.style.transform=`rotate(${wheelRot}deg)`;
  setTimeout(()=>{
    spinning=false;
    const p=WHEEL[i];
    $("#wheelResult").innerHTML=`<div class="wheel-prize">${p.t==="star"?`+${p.v} ⭐ за теб!`:`Двойни точки за следващите ${p.n} опита! ⚡`}</div>`;
    confetti();
    sb.disabled=false;sb.textContent="Супер!";sb.onclick=closeModal;
  },3700);
}

function openBuy(t){
  const card=$("#buyCard");
  const img=t.photo?`<img class="bigtreat" src="${t.photo}" alt="">`:`<div class="bigtreat">${t.emoji||"🍬"}</div>`;
  card.innerHTML=`${img}<h2>${t.name}</h2><p class="hint">Струва ⭐ ${t.price}. Задръж бутона, за да купиш.</p>
    <button class="hold-btn" id="holdBtn"><span class="fill" id="holdFill"></span><span class="lbl">Задръж за купуване</span></button>
    <button class="cancel" id="cancelBuy">Отказ</button>`;
  $("#buyOverlay").classList.add("on");
  const btn=$("#holdBtn"),fill=$("#holdFill");
  let start=0,raf=0;const DUR=1400;
  function begin(e){e.preventDefault();start=performance.now();step();}
  function step(){
    const p=Math.min(1,(performance.now()-start)/DUR);
    fill.style.width=(p*100)+"%";
    if(p>=1){ doBuy(t); return; }
    raf=requestAnimationFrame(step);
  }
  function end(){cancelAnimationFrame(raf);fill.style.width="0";}
  btn.addEventListener("pointerdown",begin);
  btn.addEventListener("pointerup",end);
  btn.addEventListener("pointerleave",end);
  btn.addEventListener("pointercancel",end);
  $("#cancelBuy").onclick=()=>{cancelAnimationFrame(raf);$("#buyOverlay").classList.remove("on");};
}
function doBuy(t){
  $("#buyOverlay").classList.remove("on");
  state.stars-=t.price;
  state.bought[t.id]=(state.bought[t.id]||0)+1;
  state.history=state.history||[];
  state.history.push({name:t.name,price:t.price,emoji:t.emoji||(t.photo?"🖼️":"🍬"),ts:Date.now()});
  if(state.history.length>300)state.history=state.history.slice(-300);
  if(state.goal===t.id)state.goal=null;
  save();renderStars();confetti();
  toast("Купи "+t.name+"! 😋");
  renderShop();
}

  // stars
  $$("[data-star]").forEach(b=>b.onclick=()=>{
    state.stars=Math.max(0,state.stars+parseInt(b.dataset.star));save();$("#pStars").textContent=state.stars;
  });
  $("#applyStars").onclick=()=>{
    const v=parseInt($("#setStars").value);if(!isNaN(v)){state.stars=Math.max(0,v);save();$("#pStars").textContent=state.stars;}
  };
  // categories
  renderCatList();
  $("#newCatAdd").onclick=()=>{
    const icon=$("#newCatIcon").value.trim()||"⭐";
    const name=$("#newCatName").value.trim();
    if(!name){toast("Дай име на категорията");return;}
    state.categories.push({id:"u"+Date.now(),name,icon,points:1,on:true,items:[]});
    save();$("#newCatName").value="";$("#newCatIcon").value="";renderCatList();
    toast("Категорията е добавена ✓");
  };
  // hard mode
  $("#wordTog").onclick=()=>{state.showWord=!state.showWord;save();$("#wordTog").classList.toggle("on",state.showWord);};
  $("#flTog").onclick=()=>{state.firstLetter=!state.firstLetter;save();$("#flTog").classList.toggle("on",state.firstLetter);};
  // treats
  renderTreatList();
  newPhoto=null;$("#ntPreview").innerHTML="";
  $("#ntPhotoBtn").onclick=()=>$("#ntPhoto").click();
  $("#ntPhoto").onchange=e=>{const f=e.target.files[0];if(f)resizeImg(f,d=>{newPhoto=d;$("#ntPreview").innerHTML=`<img src="${d}" style="width:64px;height:64px;object-fit:cover;border-radius:12px;margin:6px 0">`;});};
  $("#ntAdd").onclick=addTreat;
  // data
  $("#expBtn").onclick=exportData;
  $("#impBtn").onclick=()=>$("#impFile").click();
  $("#impFile").onchange=importData;
  $("#resetBtn").onclick=()=>{if(confirm("Сигурен ли си? Всички звезди и настройки ще се изтрият.")){state=defaults();save();renderStars();renderParent();}};
  $("#closeParent").onclick=closeParent;
}

function renderCatList(){
  const box=$("#catList");box.innerHTML="";
  state.categories.forEach((c,ci)=>{
    const acc=document.createElement("div");acc.className="cat-acc";
    acc.innerHTML=`
      <div class="cat-head">
        <span class="re">${c.icon}</span>
        <span class="nm">${c.name}</span>
        <div class="stepper">
          <button class="step minus" data-cp="${ci}|-1">−</button>
          <span class="val">${c.points}</span>
          <button class="step plus" data-cp="${ci}|1">+</button>
        </div>
        <button class="toggle ${c.on?"on":""}" data-con="${ci}" style="margin-left:8px"><span class="knob"></span></button>
        <span class="re" data-exp="${ci}" style="cursor:pointer;margin-left:4px">✏️</span>
      </div>
      <div class="cat-body" id="cb${ci}">
        <div class="items-wrap" id="iw${ci}"></div>
        <label class="lab" style="margin-top:8px">Нова дума</label>
        <div class="field-row">
          <input class="fld" id="ie${ci}" placeholder="🍓" style="max-width:72px">
          <input class="fld grow" id="il${ci}" placeholder="дума">
        </div>
        <div class="field-row">
          <button class="pbtn ghost" data-newimg="${ci}">📷 Снимка</button>
          <span class="newimg-prev" id="nip${ci}"></span>
          <button class="pbtn grow" data-add="${ci}">Добави</button>
        </div>
        <button class="pbtn danger" data-delcat="${ci}" style="margin-top:8px;width:100%">🗑️ Изтрий категорията</button>
      </div>`;
    box.appendChild(acc);
    fillItems(ci);
  });
  $$("[data-cp]").forEach(b=>b.onclick=()=>{
    const [i,d]=b.dataset.cp.split("|").map(Number);
    state.categories[i].points=Math.max(1,state.categories[i].points+d);save();
    b.parentElement.querySelector(".val").textContent=state.categories[i].points;
    fillItems(i);
  });
  $$("[data-con]").forEach(b=>b.onclick=()=>{
    const i=+b.dataset.con;state.categories[i].on=!state.categories[i].on;save();b.classList.toggle("on",state.categories[i].on);
  });
  $$("[data-exp]").forEach(b=>b.onclick=()=>$("#cb"+b.dataset.exp).classList.toggle("open"));
  $$("[data-delcat]").forEach(b=>b.onclick=()=>{
    const i=+b.dataset.delcat;
    if(confirm("Да изтрия категория „"+state.categories[i].name+"“ заедно с всичките думи?")){
      state.categories.splice(i,1);save();renderCatList();
    }
  });
  $$("[data-newimg]").forEach(b=>b.onclick=()=>{
    const i=+b.dataset.newimg;
    pickImage(d=>{pendingItemImg[i]=d;const pv=$("#nip"+i);if(pv)pv.innerHTML=`<img src="${d}" style="width:34px;height:34px;object-fit:cover;border-radius:8px">`;});
  });
  $$("[data-add]").forEach(b=>b.onclick=()=>{
    const i=+b.dataset.add;const e=$("#ie"+i).value.trim();const l=$("#il"+i).value.trim();const img=pendingItemImg[i]||null;
    if(!l||(!e&&!img)){toast("Трябва дума и емоджи или снимка");return;}
    const item={l,e:e||"🖼️"};if(img)item.img=img;
    state.categories[i].items.push(item);save();
    $("#ie"+i).value="";$("#il"+i).value="";pendingItemImg[i]=null;const pv=$("#nip"+i);if(pv)pv.innerHTML="";
    fillItems(i);
  });
}
function fillItems(ci){
  const w=$("#iw"+ci);if(!w)return;w.innerHTML="";
  const catPts=state.categories[ci].points;
  state.categories[ci].items.forEach((it,ii)=>{
    const pts=(it.p!=null)?it.p:catPts;
    const media = it.img
      ? `<span class="ir-media" data-setimg="${ci}|${ii}"><img src="${it.img}" alt=""><span class="cam">📷</span></span>`
      : `<span class="ir-media" data-setimg="${ci}|${ii}">${it.e}<span class="cam">📷</span></span>`;
    const row=document.createElement("div");row.className="item-row";
    row.innerHTML=`${media}
      <span class="ir-name">${it.l}</span>
      <span class="chip-pts"><button class="cpx" data-ip="${ci}|${ii}|-1">−</button><b>${pts}⭐</b><button class="cpx" data-ip="${ci}|${ii}|1">+</button></span>
      ${it.img?`<button class="ir-btn" data-revert="${ci}|${ii}" title="Махни снимката">↺</button>`:""}
      <button class="ir-btn" data-del="${ci}|${ii}" title="Изтрий">🗑️</button>`;
    w.appendChild(row);
  });
  w.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
    const [i,j]=b.dataset.del.split("|").map(Number);
    state.categories[i].items.splice(j,1);save();fillItems(i);
  });
  w.querySelectorAll("[data-ip]").forEach(b=>b.onclick=()=>{
    const [i,j,d]=b.dataset.ip.split("|").map(Number);
    const it=state.categories[i].items[j];
    const base=(it.p!=null)?it.p:state.categories[i].points;
    it.p=Math.max(1,base+d);save();fillItems(i);
  });
  w.querySelectorAll("[data-setimg]").forEach(b=>b.onclick=()=>{
    const [i,j]=b.dataset.setimg.split("|").map(Number);
    pickImage(d=>{state.categories[i].items[j].img=d;save();fillItems(i);});
  });
  w.querySelectorAll("[data-revert]").forEach(b=>b.onclick=()=>{
    const [i,j]=b.dataset.revert.split("|").map(Number);
    delete state.categories[i].items[j].img;save();fillItems(i);
  });
}

function renderTreatList(){
  const box=$("#treatList");box.innerHTML="";
  state.treats.forEach((t,ti)=>{
    const row=document.createElement("div");row.className="row";
    const img=t.photo?`<img src="${t.photo}" style="width:30px;height:30px;object-fit:cover;border-radius:8px">`:`<span class="re">${t.emoji||"🍬"}</span>`;
    row.innerHTML=`
      <div class="rl">${img}${t.name}</div>
      <div class="stepper">
        <button class="step minus" data-tp="${ti}|-5">−5</button>
        <span class="val">${t.price}</span>
        <button class="step plus" data-tp="${ti}|5">+5</button>
        <button class="step minus" data-tdel="${ti}" style="background:#FFD9D9">🗑️</button>
      </div>`;
    box.appendChild(row);
  });
  $$("[data-tp]").forEach(b=>b.onclick=()=>{
    const [i,d]=b.dataset.tp.split("|").map(Number);
    state.treats[i].price=Math.max(1,state.treats[i].price+d);save();
    b.parentElement.querySelector(".val").textContent=state.treats[i].price;
  });
  $$("[data-tdel]").forEach(b=>b.onclick=()=>{
    const i=+b.dataset.tdel;
    if(confirm("Да изтрия „"+state.treats[i].name+"“?")){state.treats.splice(i,1);save();renderTreatList();}
  });
}
function addTreat(){
  const name=$("#ntName").value.trim();
  const price=parseInt($("#ntPrice").value);
  const emoji=$("#ntEmoji").value.trim();
  if(!name||isNaN(price)){toast("Трябват име и цена");return;}
  if(!emoji&&!newPhoto){toast("Добави емоджи или снимка");return;}
  state.treats.push({id:"t"+Date.now(),name,price:Math.max(1,price),emoji:emoji||null,photo:newPhoto});
  save();newPhoto=null;
  $("#ntName").value="";$("#ntPrice").value="";$("#ntEmoji").value="";$("#ntPreview").innerHTML="";
  renderTreatList();toast(name+" е добавено ✓");
}

/* image resize to keep localStorage small */
function resizeImg(file,cb,max){
  max=max||320;
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const sc=Math.min(1,max/Math.max(img.width,img.height));
      const cv=document.createElement("canvas");cv.width=img.width*sc;cv.height=img.height*sc;
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
      cb(cv.toDataURL("image/jpeg",0.82));
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}

/* export / import */
function exportData(){
  const blob=new Blob([JSON.stringify(state)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="alara-igra.json";a.click();URL.revokeObjectURL(a.href);
  toast("Копието е свалено 💾");
}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{state=Object.assign(defaults(),JSON.parse(ev.target.result));save();renderStars();renderParent();toast("Заредено ✓");}catch(err){toast("Грешен файл");}};
  r.readAsText(f);
}

/* close overlays on backdrop tap */
$("#parentOverlay").addEventListener("click",e=>{if(e.target.id==="parentOverlay")closeParent();});
$("#buyOverlay").addEventListener("click",e=>{if(e.target.id==="buyOverlay")$("#buyOverlay").classList.remove("on");});

/* ---------- profiles / auth ---------- */
function showLogin(){
  App.activeId=null; state=null; saveApp();
  $(".topbar").style.display="none";
  $$(".screen").forEach(s=>s.classList.remove("on"));
  $("#login").classList.add("on");
  renderProfileList();
  refreshProfilesFromCloud();
}
function enterApp(){
  closeModal();
  $(".topbar").style.display="flex";
  $("#greetLine").textContent="Здравей, "+activeName()+"!";
  renderStars(); updateWheelBtn(); renderBoostBadge();
  show("home");
}
function activateProfile(id){
  App.activeId=id;
  const p=activeProfile();
  state=migrate(Object.assign(defaults(), p.data||{}));
  p.data=state; saveApp();
  enterApp();
}
function renderProfileList(){
  const box=$("#profileList");if(!box)return;box.innerHTML="";
  if(!App.profiles.length){box.innerHTML='<p class="hint" style="text-align:center">Още няма профили. Създай първия!</p>';return;}
  App.profiles.forEach(p=>{
    const b=document.createElement("button");b.className="profile-card";
    b.innerHTML=`<span class="pc-emoji">${p.emoji||"🧒"}</span><span class="pc-name">${p.name}</span>
      <span class="pc-lock">${p.pass?"🔒":"🔓"}</span>`;
    b.onclick=()=>askLogin(p);
    box.appendChild(b);
  });
}
function askLogin(p){
  if(!p.pass){activateProfile(p.id);return;}
  openModal(`<div style="text-align:center"><div style="font-size:54px;line-height:1">${p.emoji||"🧒"}</div><h2>${p.name}</h2>
    <p class="hint">Въведи паролата</p></div>
    <input class="fld" id="loginPass" type="password" placeholder="Парола" style="text-align:center">
    <div id="loginErr" class="hint" style="color:var(--coral-d);text-align:center;min-height:1.1em"></div>
    <div class="btn-row"><button class="pbtn ghost" id="modalClose">Отказ</button><button class="pbtn grow" id="loginGo">Влез</button></div>`);
  $("#modalClose").onclick=closeModal;
  const go=()=>{ if($("#loginPass").value===p.pass){closeModal();activateProfile(p.id);} else {$("#loginErr").textContent="Грешна парола";} };
  $("#loginGo").onclick=go;
  const inp=$("#loginPass"); inp.addEventListener("keydown",e=>{if(e.key==="Enter")go();}); setTimeout(()=>inp.focus(),60);
}
function addProfileFlow(){
  openModal(`<h2>Нов профил</h2><p class="hint">Име на детето и по желание парола.</p>
    <label class="lab">Име на детето</label><input class="fld" id="npName" placeholder="напр. Алара">
    <label class="lab">Емоджи (по избор)</label><input class="fld" id="npEmoji" placeholder="🧒">
    <label class="lab">Парола (по избор)</label><input class="fld" id="npPass" type="password" placeholder="остави празно за без парола">
    <div id="npErr" class="hint" style="color:var(--coral-d);min-height:1.1em"></div>
    <div class="btn-row"><button class="pbtn ghost" id="modalClose">Отказ</button><button class="pbtn grow" id="npCreate">Създай</button></div>`);
  $("#modalClose").onclick=closeModal;
  $("#npCreate").onclick=()=>{
    const name=$("#npName").value.trim();if(!name){$("#npErr").textContent="Въведи име";return;}
    const id="p"+Date.now();
    const np={id,name,emoji:$("#npEmoji").value.trim()||"🧒",pass:$("#npPass").value,data:defaults()};
    App.profiles.push(np);saveApp();pushProfileNow(np);closeModal();activateProfile(id);
  };
}
$("#addProfileBtn").onclick=addProfileFlow;

/* ---------- init ---------- */
showLogin();
</script>
</body>
</html>
